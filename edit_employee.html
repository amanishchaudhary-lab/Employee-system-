<!DOCTYPE html>
<html>
<head>
    <title>Edit Employee</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Edit Employee</h2>

        <form method="POST">
            <input type="text" name="name" value="{{ employee[1] }}">
            <input type="email" name="email" value="{{ employee[2] }}">
            <input type="text" name="department" value="{{ employee[3] }}">
            <input type="text" name="salary" value="{{ employee[4] }}">

            <button type="submit">Update Employee</button>
        </form>
    </div>
</div>

</body>
</html>
