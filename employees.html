<!DOCTYPE html>
<html>
<head>
    <title>Employees</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <a href="/dashboard">Dashboard</a>
    <a href="/add_employee">Add Employee</a>
    <a href="/logout">Logout</a>
</div>

<div class="container">

    <div class="card">
        <h2>All Employees</h2>

        <table class="table">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Salary</th>
                <th>Action</th>
            </tr>

            {% for emp in employees %}
            <tr>
                <td>{{ emp[0] }}</td>
                <td>{{ emp[1] }}</td>
                <td>{{ emp[2] }}</td>
                <td>{{ emp[3] }}</td>
                <td>{{ emp[4] }}</td>

                <td>
                    <a href="/edit/{{ emp[0] }}">
                        <button>Edit</button>
                    </a>

                    <a href="/delete/{{ emp[0] }}">
                        <button>Delete</button>
                    </a>
                </td>
            </tr>
            {% endfor %}

        </table>
    </div>

</div>

</body>
</html>
